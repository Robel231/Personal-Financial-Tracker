name: personal_financial_tracker
description: "ብሬ (Birre) - Personal financial tracker for Ethiopian users, built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  
  # Path & File Management
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Code Generation & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # UI & Utilities
  google_fonts: 6.1.0
  fl_chart: ^0.68.0
  intl: ^0.18.1
  uuid: ^4.2.2
  flutter_sms_inbox: ^1.0.4
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  drift_dev: ^2.14.1
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  
  # Linting
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/bire.png"
  min_sdk_version: 21
